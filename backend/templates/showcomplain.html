<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaints List</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f9f9f9;
      padding: 20px;
    }
    .complain {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .complain h3 {
      margin: 0;
      color: #333;
    }
    .complain p {
      color: #666;
    }
  </style>
</head>
<body>
  <h1>All Complaints</h1>
  <div id="complains"></div>

  <script>
    async function loadComplains() {
      const response = await fetch('http://127.0.0.1:8000/comp/get/');
      const data = await response.json();

      const container = document.getElementById('complains');
      container.innerHTML = '';

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'complain';
        div.innerHTML = `
          <h3>${item.complain_title}</h3>
          <p><strong>Room:</strong> ${item.room_number}</p>
          <p>${item.complain_text}</p>
          <small>Status: ${item.status}</small>
        `;
        container.appendChild(div);
      });
    }

    loadComplains();
  </script>
</body>
</html>
