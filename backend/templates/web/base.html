<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Hostal{% endblock %}</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: rgba(255, 255, 255, 0.08);
        --card2: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.64);
        --primary: #3b82f6;
        --primary2: #60a5fa;
        --danger: #fb7185;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 20% 0%, #1d4ed8 0%, transparent 55%),
          radial-gradient(900px 500px at 90% 10%, #2563eb 0%, transparent 50%),
          var(--bg);
        color: var(--text);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 18px 50px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px 16px;
        border-radius: var(--radius);
        background: var(--card);
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.08);
        position: sticky;
        top: 14px;
        backdrop-filter: blur(10px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary2));
        display: grid;
        place-items: center;
        font-weight: 800;
        color: white;
      }

      .brand h1 {
        font-size: 16px;
        margin: 0;
        line-height: 1.1;
      }

      .brand p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .btn {
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 650;
        transition: transform 0.05s ease, background 0.2s ease;
        user-select: none;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-primary {
        border: 0;
        background: linear-gradient(135deg, var(--primary), var(--primary2));
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.35);
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
        margin-top: 16px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        border-radius: var(--radius);
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .muted {
        color: var(--muted);
      }

      input,
      textarea {
        width: 100%;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.15);
        color: var(--text);
        outline: none;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      @media (max-width: 700px) {
        .row {
          grid-template-columns: 1fr;
        }
      }

      .post {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .post + .post {
        margin-top: 12px;
      }

      .post-title {
        margin: 0 0 6px;
        font-size: 15px;
      }

      .post-meta {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .media {
        max-width: 100%;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.15);
      }

      .error {
        color: var(--danger);
        font-weight: 650;
        font-size: 13px;
        margin-top: 10px;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="logo">H</div>
          <div>
            <h1>Hostal Community</h1>
            <p class="muted">Posts • Login • Upload</p>
          </div>
        </div>

        <div class="actions">
          <a class="btn" href="/login/">Login</a>
          <a class="btn" href="/signup/">Sign Up</a>
          <a class="btn" href="/me/" id="myProfileLink" style="display:none">My Profile</a>
          <button class="btn btn-primary" id="openCreatePostBtn" type="button" style="display:none">
            Create Post
          </button>
        </div>
      </div>

      {% block content %}{% endblock %}
    </div>
    <script>
      // If JWT exists in localStorage, show create button.
      try {
        const token = localStorage.getItem("access_token");
        const btn = document.getElementById("openCreatePostBtn");
          const profileLink = document.getElementById("myProfileLink");
        if (token && btn) btn.style.display = "inline-flex";
          if (token && profileLink) profileLink.style.display = "inline-flex";
      } catch (_) {}
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
